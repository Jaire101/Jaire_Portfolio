<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Jaire Whitehead</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
  </head>
  <body class="future-page contact-page">
    <header class="page-header">
      <a class="back" href="index.html">Home</a>
      <span>Contact</span>
    </header>
    <main class="mission-page comms-page">
      <section class="dossier">
        <p class="eyebrow">CONTACT</p>
        <h1>Start a project with Jaire.</h1>
        <p class="lead">Send a quick note about the website or app you want to build, or use the direct email link below.</p>
      </section>
      <form class="comms-form">
        <label>Name <input type="text" name="name" placeholder="Your name"></label>
        <label>Email <input type="email" name="email" placeholder="you@example.com"></label>
        <label>Project Details <textarea name="message" placeholder="Tell me what you want to build"></textarea></label>
        <button type="button">Send Message</button>
        <a class="email-link" href="mailto:your-email@example.com">Email Jaire directly</a>
      </form>
    </main>
  </body>
</html>
