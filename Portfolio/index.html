<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="description"
      content="Jaire Whitehead — front-end developer portfolio."
    />

    <title>Jaire Whitehead | Front-End Developer</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="home">
    <main class="cockpit-shell flight-deck">
      <section
        class="cockpit-reveal"
        id="cockpit-controls"
        aria-label="Portfolio cockpit"
      >
        <div class="window-effects" aria-hidden="true">
          <div class="effect-layer">
            <span class="jet jet-one"></span>
            <span class="jet jet-two"></span>

            <span class="contrail trail-one"></span>
            <span class="contrail trail-two"></span>

            <span class="burst burst-one"></span>
            <span class="burst burst-two"></span>
            <span class="burst burst-three"></span>

            <span class="moon"></span>
            <span class="stars"></span>
          </div>
        </div>

        <div class="cockpit" aria-label="Portfolio navigation">
          <div class="glareshield">
            <div class="status-strip">
              <span class="lamp red"></span>
              <span>SITE READY</span>

              <span class="lamp green"></span>
              <span>IMAGE OK</span>

              <span class="lamp amber"></span>
              <span>LINKS ACTIVE</span>
            </div>
          </div>

          <div class="console-grid">
            <!-- LEFT NAVIGATION -->
            <aside
              class="side-panel left-panel"
              aria-label="Primary navigation"
            >
              <a class="hard-button" href="about.html">
                <span>01</span>
                About Me
              </a>

              <a class="hard-button" href="projects.html">
                <span>02</span>
                Projects
              </a>

              <a class="hard-button" href="log.html">
                <span>03</span>
                Process
              </a>

              <a class="hard-button" href="contact.html">
                <span>04</span>
                Contact
              </a>
            </aside>

            <!-- LEFT PROJECT SCREEN -->
            <button
              class="mfd mfd-left game-launch"
              data-game="shooter"
              type="button"
              aria-label="Start target shooting game"
            >
              <span class="screen-title">MINI GAME</span>

              <span class="radar">
                <i class="sweep"></i>
                <i class="blip b1"></i>
                <i class="blip b2"></i>
                <i class="blip b3"></i>
              </span>

              <span class="screen-caption">SHOOT TARGETS</span>
            </button>

            <!-- CENTER CONTROLS -->
            <div class="center-stack">
              <div class="ufc" aria-label="Nameplate: Jaire Whitehead">
                <span class="ufc-label">NAME</span>
                <span class="ufc-code">JAIRE</span>
                <span class="ufc-label">WHITEHEAD</span>
              </div>

              <div class="throttle-bank" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>

              <nav class="switch-row" aria-label="Cockpit animation controls">
                <button type="button" data-effect="dogfight">Press</button>
                <button type="button" data-effect="fireworks">Press</button>
                <button type="button" data-effect="afterburner">Press</button>
                <button type="button" data-effect="flyby">Press</button>
              </nav>
            </div>

            <!-- RIGHT PROCESS SCREEN -->
            <button
              class="mfd mfd-right game-launch"
              data-game="evade"
              type="button"
              aria-label="Start dodge incoming shots game"
            >
              <span class="screen-title">MINI GAME</span>

              <span class="telemetry">
                <b>BUILD VELOCITY</b>
                <i style="--w: 84%"></i>

                <b>DESIGN RANGE</b>
                <i style="--w: 73%"></i>

                <b>CODE STABILITY</b>
                <i style="--w: 91%"></i>
              </span>

              <span class="screen-caption">EVADE TARGETS</span>
            </button>

            <!-- RIGHT ACTION BUTTONS -->
            <aside class="side-panel right-panel" aria-label="Project actions">
              <a class="hard-button" href="about.html">
                <span>JS</span>
                Skills
              </a>

              <div class="jet-switch" aria-hidden="true">
                <span>FUEL</span>
                <i></i>
              </div>

              <div class="jet-switch is-armed" aria-hidden="true">
                <span>ARM</span>
                <i></i>
              </div>

              <div class="jet-switch" aria-hidden="true">
                <span>NAV</span>
                <i></i>
              </div>
            </aside>
          </div>

          <!-- LOWER CONSOLE -->
          <div class="lower-console">
            <div class="analog">
              <span class="needle"></span>
              <b>AOA</b>
            </div>

            <div class="nameplate">
              <p>JAIRE WHITEHEAD — FRONT-END DEVELOPER</p>
              <strong>AVAILABLE FOR WEB SITE PROJECTS</strong>
            </div>

            <div class="analog alt">
              <span class="needle"></span>
              <b>G</b>
            </div>
          </div>
        </div>
      </section>

      <section class="game-overlay" aria-live="polite" aria-hidden="true">
        <div
          class="game-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="game-title"
        >
          <header class="game-header">
            <div>
              <p class="game-kicker">TRAINING SIM</p>
              <h2 id="game-title">Target Pop</h2>
            </div>
            <button
              class="game-close"
              type="button"
              aria-label="Close mini game"
            >
              CLOSE
            </button>
          </header>

          <div class="game-stats">
            <span>Score <b data-game-score>0</b></span>
            <span>Time <b data-game-time>60</b></span>
            <span data-game-status>Ready</span>
          </div>

          <div class="game-stage" data-game-stage>
            <div class="game-sky">
              <span class="game-horizon"></span>
              <span class="game-runway"></span>
              <span class="game-player" data-game-player></span>
            </div>
          </div>

          <div class="game-controls">
            <button type="button" data-game-move="-1">LEFT</button>
            <button type="button" data-game-start>START</button>
            <button type="button" data-game-move="1">RIGHT</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
